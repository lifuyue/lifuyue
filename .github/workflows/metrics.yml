name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Account activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: activity
          repositories_affiliations: owner, collaborator, organization_member
          repositories_skipped: lifuyue/xmu-java-prog, lifuyue/xmu-cn-lab, lifuyue/xmu-cg-lab, Crloxa/Computer-Network-project-1
          commits_authoring: l1fuyue@icloud.com
          config_timezone: Asia/Shanghai

      - name: Open source contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.notable.opensource.svg
          base: ""
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: pull_request, issue
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_filter: stars:>50000
          plugin_notable_skipped: |
            lifuyue/lifuyue
            lifuyue/xmu-java-prog
            lifuyue/xmu-cn-lab
            lifuyue/xmu-cg-lab
            Crloxa/Computer-Network-project-1
          config_timezone: Asia/Shanghai
